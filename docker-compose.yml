services:
  caddy:
    image: caddy:latest
    container_name: caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.prod:/etc/caddy/Caddyfile
      - ./dist:/srv/dist
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - app_network
    depends_on:
      - dufs
      - tag-server

  dufs:
    image: sigoden/dufs:latest
    container_name: dufs
    restart: always
    command: /data --allow-symlink
    volumes:
      - ./dufs_data:/data
    networks:
      - app_network

  tag-server:
    image: localhost/tag-server:latest
    container_name: tag-server
    restart: always
    command: --database /data/tag_all.db --workspace /workspace --addr 0.0.0.0:8081
    volumes:
      - ./dufs_data:/workspace
      - ./tag-db:/data
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
